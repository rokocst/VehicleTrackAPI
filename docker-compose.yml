version: "3.9"

services:
  vehicletrack-api:
    build:
      context: ./VehicleTrackAPI
      dockerfile: Dockerfile
    container_name: vehicletrack-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/vehicletrack.db
    volumes:
      - vehicletrack-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  vehicletrack-data:
